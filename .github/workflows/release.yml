name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build DoIt.app
        run: ./build.sh

      - name: Package as zip
        run: ditto -c -k --keepParent DoIt.app DoIt.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DoIt.zip
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
